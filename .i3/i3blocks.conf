# i3blocks config file
#
# Please see man i3blocks for a complete reference!
# The man page is also hosted at http://vivien.github.io/i3blocks
#
# List of valid properties:
#
# align
# color
# command
# full_text
# instance
# interval
# label
# min_width
# name
# separator
# separator_block_width
# short_text
# signal
# urgent

# Global properties
#
# The top properties below are applied to every block, but can be overridden.
# Each block command defaults to the script name to avoid boilerplate.
# command=/usr/lib/i3blocks/$BLOCK_NAME
# command=/home/matt/.i3/i3blocks/$BLOCK_NAME
separator=false
separator_block_width=5
border_top=0
border_left=0
border_right=0
border_bottom=2

# Network interface monitoring
#
# If the instance is not specified, use the interface used for default route.
# The address can be forced to IPv4 or IPv6 with -4 or -6 switches.
[music]
label=
# command=/home/matt/.i3/i3blocks/mediaplayer --player=cmus
command=/home/matt/.i3/cmus.sh -D
interval=1
markup=pango
border=#a5ffe1

[spotify]
label=
command=/home/matt/.i3/spotify.sh
interval=1
markup=pango
border=#a5ffe1

[volume]
label=
command=/home/matt/.scripts/volume.sh
interval=1
markup=pango
border=#ee829f

[wireless]
label=
command=[[ -z "$(iwgetid -r)" ]] || echo "$(iwgetid -r) "
interval=2
markup=pango
border=#ffefcc

[date]
label=
command=date '+ %d %b %Y'
interval=1
border=#6096BF
markup=pango
separator_block_width=5

[time]
label=
command=date '+ %H:%M:%S'
interval=1
border=#97e0ff
markup=pango
separator_block_width=5

[updates]
command=/home/matt/.scripts/updates.sh
interval=60
signal=3
markup=pango
border=#f99170
separator_block_width=0

# Memory usage
#
# The type defaults to "mem" if the instance is not specified.
# [memory]
# label=
# interval=10
# separator=true
# color=#f1471d
# border=#f1471d

# Disk usage
#
# The directory defaults to $HOME if the instance is not specified.
# The script may be called with a optional argument to set the alert
# (defaults to 10 for 10%).
# [disk]
# label=
# interval=30
# color=#f1471d
# border=#f1471d
#
# [load_average]
# label=
# interval=1
# separator=true
# color=#f1471d
# border=#f1471d

# Key indicators
#
# Add the following bindings to i3 config file:
#
# bindsym --release Caps_Lock exec pkill -SIGRTMIN+11 i3blocks
#[keyindicator]
#instance=CAPS
#interval=once
#signal=11

# [keyindicator]
# instance=NUM
# interval=once
# signal=1

# [wifi]
# instance=wlp3s0
# interval=10
# separator=false

# CPU usage
#
# The script may be called with -w and -c switches to specify thresholds,
# see the script for details.
# [cpu_usage]
# label=CPU
# interval=10
# min_width=CPU: 100.00%
# separator=false
